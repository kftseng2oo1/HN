<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1020"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>

    <!-- 金色主漸層 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="40%" style="stop-color:#e8a020"/>
      <stop offset="100%" style="stop-color:#b05010"/>
    </linearGradient>

    <!-- 麥克風高光 -->
    <linearGradient id="micHighlight" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5cc;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#e8a020;stop-opacity:0"/>
    </linearGradient>

    <!-- 光暈 -->
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#e8a020;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#e8a020;stop-opacity:0"/>
    </radialGradient>

    <!-- 音符漸層 -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e8a020;stop-opacity:0.5"/>
    </linearGradient>

    <!-- 底板漸層 -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#a04010"/>
    </linearGradient>

    <!-- 圓角矩形裁切 -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <!-- 陰影濾鏡 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- 發光濾鏡 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── 背景 ─────────────────────────────────────── -->
  <g clip-path="url(#roundClip)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- 細格線紋理 -->
    <g opacity="0.04" stroke="#e8a020" stroke-width="1">
      <line x1="0" y1="64" x2="512" y2="64"/>
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="320" x2="512" y2="320"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
      <line x1="64" y1="0" x2="64" y2="512"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="192" y1="0" x2="192" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="320" y1="0" x2="320" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="448" y1="0" x2="448" y2="512"/>
    </g>

    <!-- 背景光暈 -->
    <circle cx="256" cy="220" r="220" fill="url(#glowGrad)"/>

    <!-- 頂部弧光 -->
    <ellipse cx="256" cy="0" rx="260" ry="90" fill="#e8a020" opacity="0.06"/>
  </g>

  <!-- ── 主體：麥克風 ──────────────────────────────── -->
  <g clip-path="url(#roundClip)" filter="url(#shadow)">

    <!-- 麥克風頭部外框（圓形底） -->
    <ellipse cx="256" cy="205" rx="80" ry="100"
      fill="none" stroke="url(#goldGrad)" stroke-width="5" opacity="0.3"/>

    <!-- 麥克風主體 capsule -->
    <rect x="194" y="112" width="124" height="186" rx="62" ry="62"
      fill="url(#goldGrad)"/>

    <!-- 麥克風網格橫線 -->
    <g clip-path="url(#micBodyClip)" stroke="#1a0a00" stroke-width="2.5" opacity="0.35">
      <line x1="194" y1="160" x2="318" y2="160"/>
      <line x1="194" y1="185" x2="318" y2="185"/>
      <line x1="194" y1="210" x2="318" y2="210"/>
      <line x1="194" y1="235" x2="318" y2="235"/>
      <line x1="194" y1="260" x2="318" y2="260"/>
    </g>

    <!-- 高光覆蓋 -->
    <rect x="194" y="112" width="124" height="186" rx="62" ry="62"
      fill="url(#micHighlight)"/>

    <!-- 麥克風頂端小高光 -->
    <ellipse cx="235" cy="135" rx="20" ry="10"
      fill="white" opacity="0.18" transform="rotate(-20,235,135)"/>

    <!-- 麥克風底部中線分隔條 -->
    <rect x="194" y="284" width="124" height="6" rx="3"
      fill="#0a0a0f" opacity="0.4"/>

    <!-- ── 弧形支架 ── -->
    <!-- 外弧 -->
    <path d="M 156 298 Q 156 390 256 390 Q 356 390 356 298"
      fill="none" stroke="url(#goldGrad)" stroke-width="14"
      stroke-linecap="round"/>
    <!-- 內弧高光 -->
    <path d="M 163 300 Q 163 378 256 378 Q 349 378 349 300"
      fill="none" stroke="#f5d060" stroke-width="3"
      stroke-linecap="round" opacity="0.4"/>

    <!-- ── 垂直立桿 ── -->
    <rect x="242" y="390" width="28" height="52" rx="14"
      fill="url(#baseGrad)"/>
    <!-- 立桿高光 -->
    <rect x="248" y="393" width="8" height="46" rx="4"
      fill="white" opacity="0.2"/>

    <!-- ── 底座 ── -->
    <rect x="176" y="438" width="160" height="24" rx="12"
      fill="url(#baseGrad)"/>
    <!-- 底座高光線 -->
    <rect x="190" y="442" width="132" height="5" rx="2.5"
      fill="white" opacity="0.18"/>
    <!-- 底座底部陰影 -->
    <rect x="176" y="450" width="160" height="12" rx="0 0 12 12"
      fill="#7a3008" opacity="0.5"/>

    <!-- ── 音符裝飾 ── -->
    <!-- 右側音符 ♪ -->
    <g transform="translate(340, 130)" opacity="0.75" fill="url(#noteGrad)" filter="url(#glow)">
      <!-- 符頭 -->
      <ellipse cx="18" cy="38" rx="11" ry="8" transform="rotate(-20,18,38)"/>
      <!-- 符桿 -->
      <rect x="27" y="5" width="4" height="34" rx="2"/>
      <!-- 符旗 -->
      <path d="M 31 5 Q 52 14 42 28" fill="none" stroke="url(#noteGrad)" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- 左側小音符 -->
    <g transform="translate(132, 155) scale(0.72)" opacity="0.55" fill="url(#noteGrad)">
      <ellipse cx="18" cy="38" rx="11" ry="8" transform="rotate(-20,18,38)"/>
      <rect x="27" y="5" width="4" height="34" rx="2"/>
      <path d="M 31 5 Q 52 14 42 28" fill="none" stroke="url(#noteGrad)" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- 右上小點點 -->
    <circle cx="368" cy="175" r="5" fill="#f5d060" opacity="0.5"/>
    <circle cx="382" cy="158" r="3" fill="#f5d060" opacity="0.3"/>
    <circle cx="148" cy="220" r="4" fill="#f5d060" opacity="0.35"/>
    <circle cx="134" cy="200" r="2.5" fill="#f5d060" opacity="0.25"/>

  </g>

  <!-- ── 圓角邊框描邊 ─────────────────────────────── -->
  <rect width="512" height="512" rx="112" ry="112"
    fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.25"/>
</svg>
